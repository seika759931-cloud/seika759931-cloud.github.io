<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解剖クイズウェブ版</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        .hidden { display: none !important; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        h2 { color: #7f8c8d; font-size: 1.2rem; margin-bottom: 30px; }
        button {
            background-color: #ed5577;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
            width: 100%;
        }
        button:hover { background-color: #d43f5e; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            box-sizing: border-box;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .info-box {
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
            padding: 15px;
            text-align: left;
            font-size: 0.9rem;
            margin-top: 20px;
            border-radius: 0 6px 6px 0;
            line-height: 1.5;
        }
        /* モーダル（ポップアップ解説画面） */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff591;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .result-status {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            background: #ed5577;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .explanation-text {
            text-align: left;
            background: white;
            padding: 15px;
            border-radius: 6px;
            min-height: 80px;
            white-space: pre-wrap;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. ホーム画面 -->
    <div id="screen-home">
        <h1>GW解剖</h1>
        <h2>テスト!</h2>
        <button id="btn-start">スタート</button>
    </div>

    <!-- 2. 問題数設定画面 -->
    <div id="screen-config" class="hidden">
        <h1>問題数の設定</h1>
        <p style="font-size: 1.2rem;">問題数を選んでください (1〜<span id="max-q-count">0</span>)</p>
        <input type="number" id="input-kazu" min="1" value="10">
        <button id="btn-go-quiz">問題へ</button>
        <div class="info-box">
            数字を入力してください。<br>
            問題の中で英数字で入力する際は半角で入力してください。
        </div>
    </div>

    <!-- 3. クイズ画面 -->
    <div id="screen-quiz" class="hidden">
        <h1 id="quiz-progress">第 1 問</h1>
        <p style="color: #7f8c8d; font-size: 0.9rem;">下の（　　　）の中身を空欄に書きなさい。( )がない場合は問題に答えなさい。</p>
        <div id="quiz-question" style="font-size: 1.3rem; font-weight: bold; margin: 20px 0; text-align: left; line-height: 1.6;"></div>
        <input type="text" id="input-answer" placeholder="回答をここに入力" autocomplete="off">
        <button id="btn-submit">回答を終わる</button>
    </div>

    <!-- 4. 結果画面 -->
    <div id="screen-result" class="hidden">
        <h1>終了！</h1>
        <div id="result-score" style="font-size: 1.8rem; font-weight: bold; margin: 20px 0; color: #2c3e50;"></div>
        <p>あなたの解答についての評価</p>
        <div id="result-evaluation" class="info-box" style="font-size: 1.2rem; text-align: center; font-weight: bold;"></div>
        <button id="btn-restart">もう一度テストする</button>
    </div>
</div>

<!-- モーダル（解説ポップアップ） -->
<div id="explanation-modal" class="modal hidden">
    <div class="modal-content">
        <div id="modal-status" class="result-status">正解！</div>
        <div id="modal-explanation" class="explanation-text"></div>
        <button id="btn-modal-ok" style="margin-top: 0; width: auto; padding: 10px 40px;">OK</button>
    </div>
</div>

// アプリの変数let selectedQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let totalQuestionsCount = 0;

// 最大問題数を設定
document.getElementById('max-q-count').innerText = monndai.length;
document.getElementById('input-kazu').max = monndai.length;

// 配列をシャッフルする関数
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// 画面遷移用の関数
function changeScreen(screenId) {
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-config').classList.add('hidden');
    document.getElementById('screen-quiz').classList.add('hidden');
    document.getElementById('screen-result').classList.add('hidden');
    
    document.getElementById(screenId).classList.remove('hidden');
}

// 1. スタートボタン
document.getElementById('btn-start').addEventListener('click', () => {
    changeScreen('screen-config');
});

// Enterキーでも「スタート」できるようにキーボードイベント追加
window.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const homeVisible = !document.getElementById('screen-home').classList.contains('hidden');
        const configVisible = !document.getElementById('screen-config').classList.contains('hidden');
        const quizVisible = !document.getElementById('screen-quiz').classList.contains('hidden');
        
        if (homeVisible) {
            changeScreen('screen-config');
        } else if (configVisible) {
            startQuiz();
        } else if (quizVisible) {
            // クイズ画面でEnterが押されたら回答送信（ポップアップが出ていない時のみ）
            if (document.getElementById('explanation-modal').classList.contains('hidden')) {
                checkAnswer();
            } else {
                closeModal();
            }
        }
    }
});

// 2. 問題数決定ボタン
function startQuiz() {
    const kazuInput = parseInt(document.getElementById('input-kazu').value);
    if (isNaN(kazuInput) || kazuInput < 1 || kazuInput > monndai.length) {
        alert(`1から${monndai.length}までの数値を入力してください。`);
        return;
    }
    totalQuestionsCount = kazuInput;
    
    // 問題をコピーしてシャッフルし、指定数だけ抽出
    let tempQuestions = [...monndai];
    shuffle(tempQuestions);
    selectedQuestions = tempQuestions.slice(0, totalQuestionsCount);
    
    currentQuestionIndex = 0;
    score = 0;
    
    changeScreen('screen-quiz');
    showQuestion();
}
document.getElementById('btn-go-quiz').addEventListener('click', startQuiz);

// 3. 問題を表示する関数
function showQuestion() {
    const currentQuestion = selectedQuestions[currentQuestionIndex];
    document.getElementById('quiz-progress').innerText = `第 ${currentQuestionIndex + 1} 問 / ${totalQuestionsCount}問`;
    document.getElementById('quiz-question').innerText = currentQuestion[1];
    document.getElementById('input-answer').value = "";
    document.getElementById('input-answer').focus();
}

// 4. 回答判定ボタン
function checkAnswer() {
    const userAnswer = document.getElementById('input-answer').value.trim();
    const currentQuestion = selectedQuestions[currentQuestionIndex];
    const correctAnswer = currentQuestion[2].trim();
    
    const modalStatus = document.getElementById('modal-status');
    const modalExplanation = document.getElementById('modal-explanation');
    
    if (userAnswer === correctAnswer) {
        modalStatus.innerText = "正解！";
        modalStatus.style.background = "#2ecc71";
        score++;
    } else {
        modalStatus.innerText = "不正解．．．";
        modalStatus.style.background = "#e74c3c";
    }
    
    // 解説文のセット
    modalExplanation.innerText = currentQuestion[3];
    
    // モーダル（解説）を表示
    document.getElementById('explanation-modal').classList.remove('hidden');
    document.getElementById('btn-modal-ok').focus();
}
document.getElementById('btn-submit').addEventListener('click', checkAnswer);

// 5. モーダルのOKボタンが押された時
function closeModal() {
    document.getElementById('explanation-modal').classList.add('hidden');
    currentQuestionIndex++;
    
    if (currentQuestionIndex < totalQuestionsCount) {
        showQuestion();
    } else {
        showResult();
    }
}
document.getElementById('btn-modal-ok').addEventListener('click', closeModal);

// 6. 結果画面を表示する関数
function showResult() {
    const finalScore = Math.floor((score / totalQuestionsCount) * 100);
    document.getElementById('result-score').innerText = `終了！ あなたの得点は ${finalScore} / 100`;
    
    let hyouka = "";
    if (finalScore === 100) {
        hyouka = "満点合格おめでとう！！";
    } else if (finalScore >= 80) {
        hyouka = "おしい！！あと少しで満点！！";
    } else if (finalScore >= 60) {
        hyouka = "合格おめでとう！！";
    } else if (finalScore >= 50) {
        hyouka = "惜しい！もう少しで合格！もう一回チャレンジしてね！";
    } else if (finalScore <= 10) {
        hyouka = "本当に勉強してる!？";
    } else {
        hyouka = "勉強してからもう一度！";
    }
    
    document.getElementById('result-evaluation').innerText = hyouka;
    changeScreen('screen-result');
}

// 7. もう一度テストするボタン
document.getElementById('btn-restart').addEventListener('click', () => {
    changeScreen('screen-home');
});
</script>
