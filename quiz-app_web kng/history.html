<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="google-adsense-account" content="ca-pub-4057438521655639">
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>解いた問題の履歴</title>
<style>
  body {
    font-family: sans-serif;
    padding: 20px;
    background: #fdfdfd;
  }

  h1 {
    font-size: 24px;
    margin-bottom: 20px;
  }

  .item {
    background: #fff;
    border: 1px solid #ddd;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 6px;
  }

  .correct {
    color: #1e88e5;
    font-weight: bold;
  }

  .wrong {
    color: #e53935;
    font-weight: bold;
  }

  .time {
    font-size: 12px;
    color: #666;
    margin-top: 6px;
  }

  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff7aa5;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 18px;
  }
</style>
</head>
<body>

<h1>解いた問題の履歴</h1>
<div id="history"></div>

<!-- ★ ここは HTML の外側に置く！ -->
<a href="index.html" class="btn">もう一度挑戦する</a>

<script>
const history = JSON.parse(localStorage.getItem("history") || "[]");

let html = "";
history.forEach((item, index) => {
  const isCorrect = item.userAnswer === item.correct;

  html += `
    <div class="item">
      <div><strong>${index + 1}. ${item.question}</strong></div>
      <div>あなたの答え：<span class="${isCorrect ? "correct" : "wrong"}">${item.userAnswer}</span></div>
      <div>正解：${item.correct}</div>
      <div class="time">${item.time}</div>
    </div>
  `;
});

document.getElementById("history").innerHTML = html || "<p>まだ履歴がありません。</p>";
</script>

</body>
</html>
