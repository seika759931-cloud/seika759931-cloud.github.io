<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="google-adsense-account" content="ca-pub-4057438521655639">
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>解いた問題の履歴</title>
<style>
  body {
    font-family: sans-serif;
    padding: 20px;
    background: #fdfdfd;
  }
  h1 { font-size: 24px; margin-bottom: 20px; }
  .item {
    background: #fff;
    border: 1px solid #ddd;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 6px;
  }
  /* 正解・不正解の色分け */
  .correct { color: #1e88e5; font-weight: bold; }
  .wrong { color: #e53935; font-weight: bold; }
  
  /* 解説文のスタイル */
  .explanation-box {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dotted #ccc;
    font-size: 14px;
    color: #444;
    white-space: pre-wrap; /* 改行を反映させる */
  }

  .time { font-size: 12px; color: #666; margin-top: 6px; }
  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff7aa5;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 18px;
  }
</style>
</head>
<body>

<h1>解いた問題の履歴</h1>
<div id="history"></div>

<a href="index.html" class="btn">もう一度挑戦する</a>

<script>
// ローカルストレージからデータを取得（キー名が "history" であることを確認）
const historyData = JSON.parse(localStorage.getItem("quizHistory") || localStorage.getItem("history") || "[]");

let html = "";
historyData.forEach((item, index) => {
  // 保存した時のプロパティ名（item.correctAnswer か item.correct）に合わせる
  const correctText = item.correctAnswer || item.correct || "不明";
  const explanationText = item.explanation || "解説はありません。";
  
  // ユーザーの答えと正解を比較して色を変える
  const isCorrect = item.userChoice === correctText || item.userAnswer === correctText;

  html += `
    <div class="item">
      <div><strong>${index + 1}. ${item.question}</strong></div>
      <div>あなたの答え：<span class="${isCorrect ? "correct" : "wrong"}">${item.userChoice || item.userAnswer}</span></div>
      
      <div class="explanation-box">
        <strong>【解説】</strong><br>${explanationText}
      </div>

      <div class="time">${item.date || item.time}</div>
    </div>
  `;
});

document.getElementById("history").innerHTML = html || "<p>まだ履歴がありません。</p>";
</script>

</body>
</html>
