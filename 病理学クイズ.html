<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>病理学 クイズ</title>
<style>
  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #2c6fad;
    --primary-dark: #1a4f80;
    --accent: #e05577;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --text: #1a2533;
    --muted: #6b7c93;
    --border: #d0dce8;
    --yellow: #fff591;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; width: 100%; max-width: 700px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ===== HOME ===== */
  #home-screen {
    text-align: center;
    gap: 28px;
  }
  .home-title {
    font-size: 3.5rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: var(--primary);
    line-height: 1;
  }
  .home-subtitle {
    font-size: 1rem;
    color: var(--muted);
    margin-top: -10px;
  }
  .home-badge {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  /* ===== COUNT SCREEN ===== */
  #count-screen { gap: 24px; }
  .count-card {
    background: var(--card);
    border-radius: 16px;
    padding: 36px 40px;
    box-shadow: 0 4px 20px rgba(44,111,173,0.10);
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .count-card h2 { font-size: 1.4rem; color: var(--primary); }
  .count-card p { font-size: 0.9rem; color: var(--muted); }
  .count-input {
    width: 100%;
    padding: 12px 16px;
    font-size: 1.3rem;
    border: 2px solid var(--border);
    border-radius: 10px;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }
  .count-input:focus { border-color: var(--primary); }
  .total-count { color: var(--muted); font-size: 0.85rem; text-align: right; }

  /* ===== QUIZ SCREEN ===== */
  #quiz-screen { gap: 20px; width: 100%; max-width: 760px; }
  .progress-bar-wrap {
    width: 100%;
    background: var(--border);
    border-radius: 99px;
    height: 8px;
  }
  .progress-bar-fill {
    height: 8px;
    background: linear-gradient(90deg, var(--primary), #5ba4d9);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.8rem;
    color: var(--muted);
    width: 100%;
    text-align: right;
  }
  .quiz-card {
    background: var(--card);
    border-radius: 18px;
    padding: 36px 40px;
    box-shadow: 0 4px 24px rgba(44,111,173,0.10);
    width: 100%;
  }
  .qtype-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .qtype-1 { background: #e8f4fd; color: #2c6fad; }
  .qtype-2 { background: #edf9f0; color: #27ae60; }
  .qtype-3 { background: #fef3cd; color: #c07c00; }
  .qtype-5 { background: #f3e8fd; color: #7b2dad; }
  .question-text {
    font-size: 1.15rem;
    line-height: 1.7;
    font-weight: 600;
    margin-bottom: 28px;
    color: var(--text);
  }

  /* choices */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    background: #f6f9fc;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .choice-btn:hover:not(:disabled) {
    background: #e8f2fc;
    border-color: var(--primary);
    color: var(--primary);
  }
  .choice-btn.correct { background: #d4f5e2; border-color: var(--correct); color: #1a6e3e; font-weight: 700; }
  .choice-btn.wrong   { background: #fde8e8; border-color: var(--wrong);   color: #8b1a1a; }
  .choice-btn:disabled { cursor: default; }

  /* true/false */
  .tf-row { display: flex; gap: 16px; justify-content: center; margin-top: 8px; }
  .tf-btn {
    width: 140px;
    height: 80px;
    font-size: 2rem;
    border: 2px solid var(--border);
    border-radius: 14px;
    background: #f6f9fc;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tf-btn:hover:not(:disabled) { background: #e8f2fc; border-color: var(--primary); }
  .tf-btn.correct { background: #d4f5e2; border-color: var(--correct); }
  .tf-btn.wrong   { background: #fde8e8; border-color: var(--wrong); }
  .tf-btn:disabled { cursor: default; }

  /* fill-in */
  .fill-row { display: flex; gap: 10px; align-items: center; }
  .fill-input {
    flex: 1;
    padding: 12px 16px;
    font-size: 1.1rem;
    border: 2px solid var(--border);
    border-radius: 10px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .fill-input:focus { border-color: var(--primary); }
  .fill-input.correct { border-color: var(--correct); background: #d4f5e2; }
  .fill-input.wrong   { border-color: var(--wrong);   background: #fde8e8; }

  /* ===== EXPLANATION ===== */
  .explanation {
    display: none;
    margin-top: 20px;
    padding: 20px 24px;
    border-radius: 12px;
    background: var(--yellow);
    border-left: 5px solid var(--accent);
    font-size: 0.95rem;
    line-height: 1.7;
    white-space: pre-line;
  }
  .explanation.visible { display: block; }
  .result-label {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .result-label.correct { color: var(--correct); }
  .result-label.wrong   { color: var(--wrong); }

  /* ===== RESULT SCREEN ===== */
  #result-screen { gap: 24px; text-align: center; }
  .result-card {
    background: var(--card);
    border-radius: 18px;
    padding: 48px 40px;
    box-shadow: 0 4px 24px rgba(44,111,173,0.10);
    width: 100%;
  }
  .score-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), #5ba4d9);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 8px 30px rgba(44,111,173,0.3);
  }
  .score-num { font-size: 3rem; font-weight: 900; line-height: 1; }
  .score-denom { font-size: 1rem; opacity: 0.8; }
  .hyouka-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; color: var(--primary); }
  .hyouka-sub  { font-size: 0.9rem; color: var(--muted); }

  /* ===== BUTTONS ===== */
  .btn-primary {
    padding: 16px 48px;
    font-size: 1.15rem;
    font-weight: 700;
    font-family: inherit;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(44,111,173,0.25);
  }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-next {
    margin-top: 20px;
    padding: 12px 36px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    display: none;
  }
  .btn-next.visible { display: inline-block; }
  .btn-next:hover { background: #c03060; }
  .btn-submit {
    padding: 12px 32px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-submit:hover { background: var(--primary-dark); }
  .btn-submit:disabled { background: var(--border); cursor: default; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <span class="home-badge">医療系国試対策</span>
  <h1 class="home-title">病理学</h1>
  <p class="home-subtitle">ランダム出題クイズ</p>
  <button class="btn-primary" onclick="goToCount()">スタート</button>
</div>

<!-- COUNT -->
<div id="count-screen" class="screen">
  <div class="count-card">
    <h2>問題数を選んでください</h2>
    <input class="count-input" type="number" id="count-input" min="1" placeholder="例: 10"
      onkeydown="if(event.key==='Enter') startQuiz()">
    <p class="total-count" id="total-label"></p>
    <p>数字を入力してください（英数字は半角で）</p>
    <button class="btn-primary" onclick="startQuiz()">問題へ</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz-screen" class="screen">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="prog-label">0 / 0</div>
  <div class="quiz-card" id="quiz-card">
    <span class="qtype-badge" id="qtype-badge"></span>
    <div class="question-text" id="question-text"></div>
    <div id="answer-area"></div>
    <div class="explanation" id="explanation">
      <div class="result-label" id="result-label"></div>
      <div id="explanation-text"></div>
    </div>
    <div style="text-align:right">
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-card">
    <div class="score-circle">
      <div class="score-num" id="score-num">0</div>
      <div class="score-denom" id="score-denom">/ 0点</div>
    </div>
    <div class="hyouka-text" id="hyouka-text"></div>
    <div class="hyouka-sub" id="hyouka-sub"></div>
  </div>
  <button class="btn-primary" onclick="restart()">もう一度挑戦</button>
</div>

<script>
// ===================== 問題データ =====================
const monndai = [
   ["2", "病理学（pathology）の語源において、「病気」を意味する言葉はどれか", "Pathos", "Logos", "Bio", "Psycho", "正解：Pathos\n（Pathos（病気）＋Logos（真理）が語源となり、「病気のなりたちや仕組みを研究する学問」を指します）\n資料1P参照"],
    ["2", "病理学における「病因論」が研究・対象とするものはどれか", "病気の原因や背景因子", "病気や症状のおこる筋道（病変形成）", "治療薬の体内での代謝速度", "生存率の統計的解析", "正解：病気の原因や背景因子\n（病気の原因を「病因論」、症状が起こる筋道を「病理発生論」と呼びます）\n資料1P参照"],
    ["2", "資料に挙げられている「細胞損傷の原因」に含まれないものはどれか", "正常な加齢（老化）以外のすべての現象", "酸素欠乏", "免疫反応", "遺伝子異常", "正解：正常な加齢（老化）以外のすべての現象\n（資料には酸素欠乏、物理・化学・生物学的因子、免疫反応、遺伝子異常、栄養障害、老化の8つが明記されています）\n資料1P参照"],
    ["2", "不対電子をもっている原子あるいは分子を何というか", "フリーラジカル", "活性酸素種", "抗酸化酵素", "標的分子", "正解：フリーラジカル\n（不対電子を持つものをフリーラジカル、反応性の高い酸素を含む分子を活性酸素種と呼びます）\n資料1P参照"],
    ["3", "病理学の大きな特徴の一つは、病変を視覚的・形態的に捉える「形態学」である。", "b1", "", "", "正解：〇\n（資料に「病理学の特徴 ＝ 形態学」と記載されています）\n資料1P参照"],
    ["3", "活性酸素種（ROS）は非常に反応性が低く、細胞内の脂質や核酸、アミノ酸を保護する働きを持つ。", "b2","正解：✕\n（活性酸素種は反応性が高く、脂質過酸化、DNA鎖切断、タンパク質変性などの障害を引き起こします）\n資料1P参照"],
    ["3", "スーパーオキシド（O₂・⁻）を過酸化水素（H₂O₂）に変換する抗酸化酵素は、カタラーゼである。", "b2","正解：✕\n（スーパーオキシドを過酸化水素にするのは「SOD（スーパーオキシドジスミターゼ）」です）\n資料1P参照"],
    ["1", "病気や症状のおこる筋道のことを、（   ）論（または病変形成）という。", "病理発生", "正解：病理発生\n（病気の原因である病因論と対になる重要な概念です）\n資料1P参照"],
    ["1", "活性酸素種を消去する「抗酸化酵素」には、SOD、カタラーゼ、および（   ）ペルオキシダーゼがある。", "グルタチオン", "正解：グルタチオン\n（これらは細胞を酸化ストレスから守る代表的な酵素です）\n資料1P参照"],
    ["1", "フリーラジカルを消去する「非酵素抗酸化物」として、資料に挙げられているのはビタミンA、ビタミンC、ビタミン（   ）などである。", "E", "正解：E\n（ビタミンA、C、Eは抗酸化作用を持つ主要な栄養素です）\n資料1P参照"],
    ["2", "細胞分裂の回数は有限であるとする、老化のプログラム説における限界の名称はどれか", "ヘイフリックの限界", "テロメアの限界", "エラー蓄積の限界", "適応の限界", "正解：ヘイフリックの限界\n（細胞分裂数は有限であるという説で、複製ごとにテロメアが短くなることと関連します）\n資料2P参照"],
    ["2", "正常の大きさまで発育した臓器や組織の「容積が減少すること」を何というか", "萎縮", "低形成", "過形成", "化生", "正解：萎縮\n（正常の大きさまで発育した後に減少するのが萎縮（Atrophy）です）\n資料2P参照"],
    ["2", "発生や成熟の異常によって、そもそも「正常の大きさまで発育しなかった場合」を何というか", "低形成", "萎縮", "過形成", "作業性肥大", "正解：低形成\n（発育しなかった場合は低形成（hypogenesis）と呼び、萎縮とは明確に区別されます）\n資料2P参照"],
    ["2", "細胞の「数が増加する現象」を何というか", "過形成", "肥大", "萎縮", "化生", "正解：過形成\n（容積が増えるのが肥大（Hypertrophy）、数が増えるのが過形成（Hyperplasia）です）\n資料2P参照"],
    ["3", "染色体の末端領域にあり、染色体の安定に必須であるが、複製のたびに短くなる部分をテロメアという。", "b1","正解：〇\n（テロメアは細胞分裂のたびに短くなり、細胞の老化に関わります）\n資料2P参照"],
    ["3", "長期にわたる傷害刺激から、最終的に細胞が老化するという考え方を「プログラム説」という。", "b2","正解：✕\n（傷害刺激の蓄積によるものは「エラー蓄積説」といいます）\n資料2P参照"],
    ["3", "骨折などでギプス固定した後に筋肉が痩せる現象は、萎縮の分類における「圧迫萎縮」にあたる。", "b2","正解：✕\n（使わないことによる萎縮は「廃用萎縮（無為萎縮）」に分類されます）\n資料2P参照"],
    ["1", "生体が恒常性を維持するための反応（萎縮・肥大・過形成・化生）を総称して（   ）という。", "適応", "正解：適応\n（細胞が環境の変化に合わせて変化する現象です）\n資料2P参照"],
    ["1", "細胞の「容積が増加する現象」を（   ）という。", "肥大", "正解：肥大\n（資料には作業性肥大、代償性肥大、ホルモン性肥大が挙げられています）\n資料2P参照"],
    ["1", "老化に基づく種々の衰えのことを、カタカナで（   ）という。", "フレイル", "正解：フレイル\n（加齢に伴う形態的・生理機能の低下（frailty）を指します）\n資料2P参照"],
    ["2", "分化成熟した組織が、異なる形態・機能をもつ別の方向に分化した組織に変化する現象を何というか", "化生", "肥大", "萎縮", "アポトーシス", "正解：化生\n（化生（Metaplasia）の定義そのものであり、刺激に対する適応現象です）\n資料3P参照"],
    ["2", "逆流性食道炎などが原因で、食道の扁平上皮が円柱上皮に変化した状態の粘膜を何というか", "バレット粘膜", "腸上皮化生", "乾酪壊死", "肉芽組織", "正解：バレット粘膜\n（バレット食道とも呼ばれ、扁平上皮から円柱上皮への変化（円柱上皮化生）の代表例です）\n資料3P参照"],
    ["2", "脳梗塞において、自己融解が高度に生じることで見られる壊死の形式はどれか", "融解壊死", "凝固壊死", "乾酪壊死", "アポトーシス", "正解：融解壊死\n（液化壊死とも呼ばれ、脳梗塞がその代表例です。心筋梗塞は凝固壊死になります）\n資料4P参照"],
    ["2", "結核結節で見られ、脂肪成分が多いために壊死組織がチーズ様に変化する壊死の形式はどれか", "乾酪壊死", "凝固壊死", "融解壊死", "フィブリノイド変性", "正解：乾酪壊死\n（結核に特徴的な壊死像であり、マクロの見た目がチーズに似ていることから名付けられています）\n資料4P参照"],
    ["3", "壊死（necrosis）は、細胞の膨潤と溶解を伴い、細胞内成分が外部へ漏出するため強い炎症反応を引き起こす。", "b1", "", "", "正解：〇\n（壊死は受動的で広範な領域に及び、強い炎症を伴うのが特徴です。アポトーシスとの対比が最重要です）\n資料3P参照"],
    ["3", "アポトーシス（apoptosis）は、遺伝子やシグナルによって厳密に制御された能動的な細胞死であり、周囲に炎症反応を引き起こさない。", "b1", "", "", "正解：〇\n（アポトーシスは個々の細胞死であり、断片化（アポトーシス小体）されて処理されるため炎症を起こしません）\n資料3P参照"],
    ["3", "喫煙や慢性炎症の刺激により、気管支の「線毛円柱上皮」が「重層扁平上皮」に変化することを腸上皮化生という。", "b2", "", "", "正解：✕\n（気管支の上皮が扁平上皮になるのは「扁平上皮化生」です。胃粘膜が腸のようになるのが腸上皮化生です）\n資料3P参照"],
    ["1", "アポトーシスにおいて、ヌクレオソーム単位での規則的な断片化が起こることで、ゲル電気泳動などで確認できる特徴的な「はしご状」の像をDNA（   ）という。", "ラダー", "正解：ラダー\n（DNAラダーはアポトーシスに特徴的な現象として資料に記載されています）\n資料4P参照"],

// ===================== アプリ状態 =====================
let questions = [];
let currentIdx = 0;
let score = 0;
let total = 0;
let answered = false;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToCount() {
  document.getElementById('total-label').textContent = `全 ${monndai.length} 問から出題`;
  showScreen('count-screen');
  document.getElementById('count-input').focus();
}

function startQuiz() {
  const val = parseInt(document.getElementById('count-input').value);
  if (!val || val < 1) {
    alert('1以上の数字を入力してください。');
    return;
  }
  total = Math.min(val, monndai.length);
  score = 0;
  currentIdx = 0;
  answered = false;
  questions = shuffle([...monndai]).slice(0, total);
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentIdx];
  const type = q[0];

  // progress
  const pct = (currentIdx / total) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${currentIdx + 1} / ${total}`;

  // badge
  const badge = document.getElementById('qtype-badge');
  const typeMap = {'1':'穴埋め問題','2':'4択問題','3':'〇✕問題','5':'2択問題'};
  badge.textContent = typeMap[type] || '問題';
  badge.className = `qtype-badge qtype-${type}`;

  // question
  document.getElementById('question-text').textContent = `第${currentIdx+1}問　${q[1]}`;

  // hide explanation
  const expEl = document.getElementById('explanation');
  expEl.classList.remove('visible');
  document.getElementById('btn-next').classList.remove('visible');

  const area = document.getElementById('answer-area');
  area.innerHTML = '';

  if (type === '2') {
    // 4択
    const choices = shuffle([q[2], q[3], q[4], q[5]]);
    const div = document.createElement('div');
    div.className = 'choices';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c;
      btn.onclick = () => judgeType2(btn, c, q[2], q, div);
      div.appendChild(btn);
    });
    area.appendChild(div);
  } else if (type === '3') {
    // 〇✕
    const correctBtn = q[2]; // "b1"=〇 "b2"=✕
    const row = document.createElement('div');
    row.className = 'tf-row';
    const maru = document.createElement('button');
    maru.className = 'tf-btn'; maru.textContent = '〇';
    maru.onclick = () => judgeType3(maru, 'b1', correctBtn, q, row);
    const batsu = document.createElement('button');
    batsu.className = 'tf-btn'; batsu.textContent = '✕';
    batsu.onclick = () => judgeType3(batsu, 'b2', correctBtn, q, row);
    row.appendChild(maru); row.appendChild(batsu);
    area.appendChild(row);
  } else if (type === '1') {
    // 穴埋め
    const row = document.createElement('div');
    row.className = 'fill-row';
    const input = document.createElement('input');
    input.className = 'fill-input'; input.type = 'text';
    input.placeholder = '回答を入力…';
    input.onkeydown = (e) => { if (e.key === 'Enter') judgeType1(input, q); };
    const btn = document.createElement('button');
    btn.className = 'btn-submit'; btn.textContent = '回答する';
    btn.onclick = () => judgeType1(input, q);
    row.appendChild(input); row.appendChild(btn);
    area.appendChild(row);
    setTimeout(() => input.focus(), 50);
  } else if (type === '5') {
    // 2択
    const choices = shuffle([
      {label: q[2], val: '2'},
      {label: q[3], val: '3'}
    ]);
    const div = document.createElement('div');
    div.className = 'choices';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.label;
      btn.onclick = () => judgeType5(btn, c.val, q, div);
      div.appendChild(btn);
    });
    area.appendChild(div);
  }
}

function showExplanation(isCorrect, explanationText) {
  answered = true;
  const expEl = document.getElementById('explanation');
  const lbl = document.getElementById('result-label');
  lbl.textContent = isCorrect ? '正解！🎉' : '不正解…';
  lbl.className = 'result-label ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('explanation-text').textContent = explanationText;
  expEl.classList.add('visible');
  document.getElementById('btn-next').classList.add('visible');
  expEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function judgeType2(clickedBtn, selected, correct, q, container) {
  if (answered) return;
  const isCorrect = selected === correct;
  if (isCorrect) score++;
  container.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
    else if (b === clickedBtn && !isCorrect) b.classList.add('wrong');
  });
  showExplanation(isCorrect, q[6]);
}

function judgeType3(clickedBtn, selected, correct, q, container) {
  if (answered) return;
  const isCorrect = selected === correct;
  if (isCorrect) score++;
  // find explanation: it can be at index 3 or 5 depending on data format
  const expl = q[3] || q[5] || '';
  container.querySelectorAll('.tf-btn').forEach(b => {
    b.disabled = true;
    const isCircle = b.textContent === '〇';
    const btnKey = isCircle ? 'b1' : 'b2';
    if (btnKey === correct) b.classList.add('correct');
    else if (b === clickedBtn && !isCorrect) b.classList.add('wrong');
  });
  showExplanation(isCorrect, expl);
}

function judgeType1(input, q) {
  if (answered) return;
  const userAns = input.value.trim();
  if (!userAns) return;
  // Use flexible matching (normalize)
  const normalize = s => s.replace(/\s/g,'').toLowerCase();
  const isCorrect = normalize(userAns) === normalize(q[2]);
  if (isCorrect) score++;
  input.disabled = true;
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.nextElementSibling.disabled = true;
  showExplanation(isCorrect, q[3]);
}

function judgeType5(clickedBtn, selected, q, container) {
  if (answered) return;
  const isCorrect = selected === '2'; // index 2 is correct choice
  if (isCorrect) score++;
  container.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === q[2]) b.classList.add('correct');
    else if (b === clickedBtn && !isCorrect) b.classList.add('wrong');
  });
  showExplanation(isCorrect, q[4]);
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= total) {
    showResult();
  } else {
    renderQuestion();
    document.getElementById('quiz-card').scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function showResult() {
  const pct = Math.round((score / total) * 100);
  document.getElementById('score-num').textContent = pct;
  document.getElementById('score-denom').textContent = `/ 100点`;
  document.getElementById('prog-fill').style.width = '100%';

  let hyouka, sub;
  if (pct === 100) { hyouka = '満点合格おめでとう！！🎊'; sub = '完璧です！素晴らしい！'; }
  else if (pct >= 80) { hyouka = 'おしい！あと少しで満点！'; sub = `正解数: ${score} / ${total}`; }
  else if (pct >= 60) { hyouka = '合格おめでとう！！'; sub = `正解数: ${score} / ${total}`; }
  else if (pct >= 50) { hyouka = '惜しい！もう少しで合格！'; sub = 'もう一回チャレンジしてね！'; }
  else if (pct <= 10) { hyouka = '本当に勉強してる!？😅'; sub = '頑張れ！'; }
  else { hyouka = '勉強してからもう一度！'; sub = `正解数: ${score} / ${total}`; }

  document.getElementById('hyouka-text').textContent = hyouka;
  document.getElementById('hyouka-sub').textContent = sub;
  showScreen('result-screen');
}

function restart() {
  document.getElementById('count-input').value = '';
  showScreen('count-screen');
  document.getElementById('count-input').focus();
}
</script>
